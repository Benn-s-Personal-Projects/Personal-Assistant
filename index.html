<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Benns Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0f;--s:#17171a;--s2:#1f1f24;--b:#2a2a30;--a:#c8f135;--a2:#3dffc0;--t:#f0f0f0;--m:#6b6b78;--d:#ff5f57;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;min-height:100dvh;display:flex;flex-direction:column}
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:100;padding:32px}
.logo{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--a);letter-spacing:-2px;line-height:1;text-align:center}
.sub{font-size:11px;color:var(--m);letter-spacing:3px;text-transform:uppercase}
.pin-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;cursor:pointer}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--b);transition:all 0.15s}
.pin-dot.filled{background:var(--a);border-color:var(--a);transform:scale(1.1)}
.pin-dot.shake{background:var(--d);border-color:var(--d)}
.pin-hint{color:var(--m);font-size:12px;letter-spacing:2px;text-transform:uppercase}
#pin-input{position:fixed;top:-100px;opacity:0;width:1px;height:1px;font-size:16px}
#pin-err{color:var(--d);font-size:13px;min-height:20px}
#app{display:none;flex-direction:column;height:100dvh}
header{padding:16px 20px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--a);letter-spacing:-1px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--a2);box-shadow:0 0 8px var(--a2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{flex:1;overflow-y:auto;padding:16px 16px 0;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:88%;padding:12px 16px;border-radius:var(--r);font-size:14px;line-height:1.6;animation:up 0.2s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.u{background:var(--a);color:#0e0e0f;align-self:flex-end}
.aa{background:var(--s);border:1px solid var(--b);align-self:flex-start}
.aa b{color:var(--a)}
.sys{color:var(--m);font-size:11px;text-align:center;align-self:center;padding:4px 0}
#chips{padding:12px 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--m);white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip:active{border-color:var(--a);color:var(--a)}
#bar{padding:10px 16px 20px;border-top:1px solid var(--b);background:var(--bg);display:flex;gap:10px;align-items:flex-end}
#inp{flex:1;background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:13px 16px;color:var(--t);font-family:'DM Mono',monospace;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color 0.2s}
#inp:focus{border-color:var(--a)}
#inp::placeholder{color:var(--m)}
#send{background:var(--a);color:#0e0e0f;border:none;border-radius:var(--r);width:46px;height:46px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send:disabled{opacity:0.4}
.typing{display:flex;gap:4px;align-items:center;padding:14px 16px;background:var(--s);border:1px solid var(--b);border-radius:var(--r);align-self:flex-start}
.typing span{width:7px;height:7px;background:var(--m);border-radius:50%;animation:bo 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px);background:var(--a)}}
</style>
</head>
<body>

<div id="lock">
  <div class="logo">BENN'S<br>BRAIN</div>
  <div class="sub">Personal Assistant</div>
  <div class="pin-wrap" onclick="focusPin()">
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-hint">Tap here &amp; type your PIN</div>
  </div>
  <input id="pin-input" type="tel" inputmode="numeric" maxlength="4" autocomplete="off">
  <div id="pin-err"></div>
</div>

<div id="app">
  <header><div class="title">BENN'S BRAIN</div><div class="dot"></div></header>
  <div id="chat"></div>
  <div id="chips">
    <div class="chip" onclick="qs('What are my top priority tasks?')">&#127919; Tasks</div>
    <div class="chip" onclick="qs('Show my recent notes')">&#128203; Notes</div>
    <div class="chip" onclick="qs('What are my goals?')">&#127942; Goals</div>
    <div class="chip" onclick="qs('Show my contacts')">&#128101; Contacts</div>
    <div class="chip" onclick="qs('Any upcoming deadlines?')">&#9200; Deadlines</div>
    <div class="chip" onclick="qs('Show my personal info and account details')">&#128274; Personal info</div>
    <div class="chip" onclick="qs('What projects am I working on?')">&#128193; Projects</div>
    <div class="chip" onclick="qs('Show my habits and streaks')">&#128170; Habits</div>
    <div class="chip" onclick="qs('Show recent transactions')">&#128176; Spending</div>
  </div>
  <div id="bar">
    <textarea id="inp" placeholder="Remember to... / What is my... / Show me..." rows="1" onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button id="send" onclick="go()">&#8593;</button>
  </div>
</div>

<script>
var PIN = '8520';
var SB_URL = 'https://xpnnvcpzqimtgqghwxdt.supabase.co';
var SB_KEY = 'sb_publishable_6iMpnTAJX0UDWpCTycikig_sZeIti9J';
var ANT_KEY = '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';
var MODEL = 'claude-sonnet-4-20250514';
var hist = [];
var busy = false;
var pinVal = '';

function focusPin() {
  document.getElementById('pin-input').focus();
}

document.getElementById('pin-input').addEventListener('input', function() {
  pinVal = this.value.replace(/[^0-9]/g,'').slice(0,4);
  this.value = pinVal;
  for(var i=0;i<4;i++){
    var dot = document.getElementById('pd'+i);
    dot.classList.toggle('filled', i < pinVal.length);
  }
  if(pinVal.length === 4) {
    if(pinVal === PIN) {
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      addMsg('aa', "Good to see you, Benn. I'm connected to your database. Just talk to me naturally — <b>remember to organise the hunting trip</b>, <b>what is my tax number</b>, <b>show top priority tasks</b>.");
    } else {
      document.getElementById('pin-err').textContent = 'Wrong PIN. Try again.';
      var dots = document.querySelectorAll('.pin-dot');
      dots.forEach(function(d){ d.classList.add('shake'); d.classList.remove('filled'); });
      setTimeout(function(){
        dots.forEach(function(d){ d.classList.remove('shake'); });
        document.getElementById('pin-err').textContent = '';
        pinVal = '';
        document.getElementById('pin-input').value = '';
      }, 800);
    }
  }
});

function addMsg(cls, html) {
  var c = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'msg '+cls;
  d.innerHTML = html;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addSys(t) {
  var c = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'msg sys';
  d.textContent = '— '+t+' —';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  var c = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'typing'; d.id = 'td';
  d.innerHTML = '<span></span><span></span><span></span>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function hideTyping(){ var e=document.getElementById('td'); if(e)e.remove(); }

function fmt(t){
  return t.replace(/**(.*?)**/g,'<b>$1</b>').replace(/
/g,'<br>');
}

async function sbGet(table, opts) {
  opts = opts||{};
  var url = SB_URL+'/rest/v1/'+table;
  var p=[];
  if(opts.s) p.push('select='+opts.s);
  if(opts.f) p.push(opts.f);
  if(opts.o) p.push('order='+opts.o);
  if(opts.l) p.push('limit='+opts.l);
  if(p.length) url+='?'+p.join('&');
  var r = await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error('DB error '+r.status);
  return r.json();
}

async function sbPost(table, data) {
  var r = await fetch(SB_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok){var e=await r.text();throw new Error(e);}
  return r.json();
}

async function getCtx(msg) {
  var m=msg.toLowerCase(), ctx='';
  try {
    if(/task|todo|priority|urgent|deadline|remember|remind|buy |book |organis|schedul/.test(m)){
      var d=await sbGet('tasks',{s:'*',o:'created_at.desc',l:25});
      if(d.length) ctx+='TASKS:
'+JSON.stringify(d)+'
';
    }
    if(/note|wrote|jot/.test(m)){
      var d=await sbGet('notes',{s:'*',o:'created_at.desc',l:15});
      if(d.length) ctx+='NOTES:
'+JSON.stringify(d)+'
';
    }
    if(/tax|bank|account|personal|number| id |info|detail/.test(m)){
      var d1=await sbGet('personal_knowledge',{s:'*'});
      var d2=await sbGet('personal_tax_info',{s:'*'});
      var d3=await sbGet('accounts',{s:'*'});
      if(d1.length) ctx+='PERSONAL_KNOWLEDGE:
'+JSON.stringify(d1)+'
';
      if(d2.length) ctx+='PERSONAL_TAX_INFO:
'+JSON.stringify(d2)+'
';
      if(d3.length) ctx+='ACCOUNTS:
'+JSON.stringify(d3)+'
';
    }
    if(/goal|target|aim/.test(m)){var d=await sbGet('goals',{s:'*'}); if(d.length) ctx+='GOALS:
'+JSON.stringify(d)+'
';}
    if(/contact|phone|email|call/.test(m)){var d=await sbGet('contacts',{s:'*',l:30}); if(d.length) ctx+='CONTACTS:
'+JSON.stringify(d)+'
';}
    if(/project|work on/.test(m)){var d=await sbGet('projects',{s:'*'}); if(d.length) ctx+='PROJECTS:
'+JSON.stringify(d)+'
';}
    if(/habit|routine|streak/.test(m)){
      var d1=await sbGet('habits',{s:'*'}); var d2=await sbGet('habit_logs',{s:'*',o:'created_at.desc',l:14});
      if(d1.length) ctx+='HABITS:
'+JSON.stringify(d1)+'
';
      if(d2.length) ctx+='HABIT_LOGS:
'+JSON.stringify(d2)+'
';
    }
    if(/propert|house|land|farm/.test(m)){var d=await sbGet('properties',{s:'*'}); if(d.length) ctx+='PROPERTIES:
'+JSON.stringify(d)+'
';}
    if(/business|company/.test(m)){var d=await sbGet('business_info',{s:'*'}); if(d.length) ctx+='BUSINESS:
'+JSON.stringify(d)+'
';}
    if(/insur|policy|cover/.test(m)){var d=await sbGet('insurance_policies',{s:'*'}); if(d.length) ctx+='INSURANCE:
'+JSON.stringify(d)+'
';}
    if(/spend|budget|transact|money|expense/.test(m)){
      var d1=await sbGet('transactions',{s:'*',o:'created_at.desc',l:20}); var d2=await sbGet('budgets',{s:'*'});
      if(d1.length) ctx+='TRANSACTIONS:
'+JSON.stringify(d1)+'
';
      if(d2.length) ctx+='BUDGETS:
'+JSON.stringify(d2)+'
';
    }
    if(!ctx){
      var d1=await sbGet('tasks',{s:'*',o:'created_at.desc',l:10}); var d2=await sbGet('notes',{s:'*',o:'created_at.desc',l:5});
      if(d1.length) ctx+='TASKS:
'+JSON.stringify(d1)+'
';
      if(d2.length) ctx+='NOTES:
'+JSON.stringify(d2)+'
';
    }
  } catch(e){ ctx+='[DB error: '+e.message+']'; }
  return ctx;
}

async function go() {
  var inp=document.getElementById('inp');
  var msg=inp.value.trim();
  if(!msg||busy) return;
  inp.value=''; inp.style.height='auto';
  busy=true; document.getElementById('send').disabled=true;
  addMsg('u', msg.replace(/</g,'&lt;'));
  showTyping();
  var ctx=await getCtx(msg);
  var sys='You are Benns personal AI brain. You have access to his Supabase database.

Tables: accounts, api_keys, budgets, business_info, colleagues, contacts, goals, habit_logs, habits, insurance_policies, notes, payslips, personal_knowledge, personal_tax_info, projects, properties, recipes, tasks, tax_assessments, transactions, utility_bills.

DATA:
'+(ctx||'No data.')+'

RULES: Be concise. When Benn says remember/remind/buy/book/organise X respond with ###INSERT:tasks:{"title":"X","priority":"medium","status":"pending"}### and confirm. Show sensitive info freely - Benn is authenticated. Use **bold** for key values. Task icons: high=🔴 medium=🟡 low=🟢. Keep responses short and mobile friendly.';
  hist.push({role:'user',content:msg});
  try {
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANT_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:MODEL,max_tokens:1000,system:sys,messages:hist})
    });
    var data=await res.json();
    var reply=(data.content&&data.content[0])?data.content[0].text:'No response.';
    hist.push({role:'assistant',content:reply});
    var am=reply.match(/###INSERT:(w+):({[^}]+})###/);
    var display=reply.replace(/###INSERT:w+:{[^}]+}###/g,'').trim();
    hideTyping();
    addMsg('aa',fmt(display));
    if(am){
      try{
        var tbl=am[1]; var payload=JSON.parse(am[2]);
        await sbPost(tbl,payload);
        addSys('Saved to '+tbl);
      }catch(e){addSys('Save failed: '+e.message);}
    }
  } catch(e){ hideTyping(); addMsg('aa','Error: '+e.message); }
  busy=false; document.getElementById('send').disabled=false;
}

function qs(t){document.getElementById('inp').value=t; go();}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
</script>
</body>
</html>
